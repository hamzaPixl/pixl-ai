[project]
name = "pixl-cli"
version = "10.0.0"
description = "Pixl CLI — local bridge to the pixl-engine"
requires-python = ">=3.12"
dependencies = ["pixl-engine", "click>=8.1"]

[project.scripts]
pixl = "pixl_cli.main:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.hooks.custom]
path = "hatch_build.py"

[tool.hatch.build.targets.wheel]
packages = ["pixl_cli"]
