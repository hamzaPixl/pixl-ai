[project]
name = "pixl-engine"
version = "9.0.0"
description = "Pixl engine — models, providers, and utilities"
requires-python = ">=3.12"
dependencies = [
    "pydantic[email]>=2.12.5",
    "pyyaml>=6.0.3",
    "claude-agent-sdk>=0.1.37",
    "anthropic>=0.79.0",
    "openai>=2.20.0",
    "httpx>=0.28.0",
    "rich>=13.0",
]

[project.optional-dependencies]
api = ["fastapi>=0.115.0", "bcrypt>=4.0.0", "pyjwt>=2.8.0", "redis[hiredis]>=5.0"]
dev = ["pytest>=8.0", "pytest-asyncio>=0.24"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["pixl"]
