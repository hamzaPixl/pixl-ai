id: debug
name: Debug Workflow
description: RED-FIX-PROVE debugging with plugin-delegated sessions
version: 2.1.0
tags: [debug, bugfix]
tier: orchestration
workflow_format: v2
session_mode: plugin
routing:
  auto_route: true
  sub_invocable: false

stages:
  # Phase 1: Reproduce & Isolate
  - id: reproduce
    name: Reproduce & Isolate
    type: task
    max_turns: 80
    prompt: |
      Systematically reproduce and isolate the bug.

      1. Collect baseline: symptom, expected behavior, reproduction steps
      2. Run tests, capture errors, add instrumentation if needed
      3. Classify bug category (render/state, data/API, routing, build)
      4. Binary search to narrow suspect area by ~50%

      If the bug appears security-related, use `/security-scan` for
      root-cause analysis and vulnerability assessment.

      Save findings using `pixl artifact put`:
      - `debug-context.md`: symptom, scope, environment, evidence
      - `isolation-hypothesis.md`: category, narrowed suspect area, hypothesis

      ## Available Crew Skills
      - `/security-scan` — OWASP audit if security-related
      - `/dependency-review` — check if bug is from outdated dependency
    outputs: [debug-context.md, isolation-hypothesis.md]
    contract:
      must_write: [debug-context.md, isolation-hypothesis.md]

  # Gate: Confirm reproduction before fixing
  - id: confirm-repro
    name: Confirm Reproduced
    type: gate
    timeout_minutes: 120
    timeout_policy: reject
    required_artifacts: [debug-context.md, isolation-hypothesis.md]
    description: Confirm the bug has been reproduced and the hypothesis is sound

  # Phase 2: Fix & Prove
  - id: fix
    name: Fix & Prove
    type: task
    max_turns: 150
    prompt: |
      Apply the smallest possible fix and prove it works.

      Fix Order:
      1. Use `/test-writer` to generate a regression test that fails
         without the fix (RED phase)
      2. Apply minimal correctness patch based on isolation hypothesis
      3. Run full test suite — all tests must pass
      4. Refactor only if necessary (after tests pass)

      Proof Bundle (save to `proof-bundle.md` via `pixl artifact put`):
      - Test results (pass/fail)
      - Before/after evidence
      - Root cause explanation (3-5 lines)
      - Why it won't regress (link to test)

      ## Available Crew Skills
      - `/test-writer` — generate regression test for the bug
      - `/test-runner` — run test suite with smart discovery
    required_artifacts: [debug-context.md, isolation-hypothesis.md]
    outputs: [proof-bundle.md]
    contract:
      must_write: [proof-bundle.md]

  # Phase 3: Regression Test — ensure the bug stays fixed
  - id: regression-test
    name: Regression Test
    type: task
    max_turns: 40
    prompt: |
      Generate and verify a regression test that would have caught this bug.

      1. Read the `proof-bundle.md` artifact for root cause and fix details
      2. Use `/test-writer` to generate a focused regression test that:
         - Reproduces the exact conditions that triggered the bug
         - Asserts the correct behavior (not just absence of error)
         - Is named clearly to indicate it guards against this regression
      3. Write the test file to the project's test directory
      4. Run the regression test with `/test-runner` — it MUST pass
      5. If feasible, verify the test would FAIL without the fix:
         - `git stash` the fix changes
         - Run the regression test (expect failure)
         - `git stash pop` to restore the fix
      6. Update baton with the regression test file path

      Save `regression-test-report.md` via `pixl artifact put` with:
      - Test file path and description
      - Test output (passing with fix)
      - Reverse verification result (failing without fix, if performed)
      - Overall result: PASS or FAIL

      ## Available Crew Skills
      - `/test-writer` — generate regression test suites
      - `/test-runner` — run tests with smart discovery
    required_artifacts: [proof-bundle.md]
    outputs: [regression-test-report.md]
    contract:
      must_write: [regression-test-report.md]

  # Phase 4: Finalize
  - id: finalize
    name: Review & Finalize
    type: task
    max_turns: 100
    prompt: |
      Review the fix, ensure quality, and prepare for PR.
      1. Use `/self-review-fix-loop` for automated review + fix cycles
      2. Use `/code-review` for final quality gate
      3. Ensure tests pass and lint is clean
      4. Create a PR with descriptive title and body using `gh pr create`

      ## Available Crew Skills
      - `/self-review-fix-loop` — iterative review + auto-fix
      - `/code-review` — multi-agent PR review

loops:
  - id: debug-loop
    from: fix
    to: reproduce
    trigger: failure
    max_iterations: 3
  - id: regression-fix
    from: regression-test
    to: fix
    trigger: failure
    max_iterations: 2
