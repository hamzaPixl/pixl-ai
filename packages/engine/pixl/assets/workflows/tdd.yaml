id: tdd
name: TDD Workflow
description: Test-driven development with plugin-delegated sessions
version: 2.1.0
tags: [tdd, feature]
tier: orchestration
workflow_format: v2
session_mode: plugin
routing:
  auto_route: true
  sub_invocable: false

stages:
  # Phase 1: Design — understand requirements, produce design.md
  - id: design
    name: Design
    type: task
    max_turns: 80
    prompt: |
      Analyze the feature request and produce a design document.
      Save as `design.md` artifact using `pixl artifact put`.
      Include: Summary, Requirements, Scope, Technical Approach.

      Structure the design with clear, testable acceptance criteria so
      `/spec-review` can validate implementation coverage later.

      ## Available Crew Skills
      - `/prd-analysis` — if requirements docs exist, parse into 8 structured categories
      - `/task-plan` — break the design into ordered tasks with dependencies
      - `/ddd-pattern` — if domain modeling is needed, analyze bounded contexts
    outputs: [design.md]
    contract:
      must_write: [design.md]
      must_include_sections:
        design.md: ["Summary", "Requirements", "Scope|Technical Approach"]

  # Gate: Human approves design
  - id: approve-design
    name: Approve Design
    type: gate
    timeout_minutes: 60
    required_artifacts: [design.md]
    freeze_artifacts: [design.md]

  # Phase 2: Implement — TDD cycle, write tests first, then code
  - id: implement
    name: Implement
    type: task
    max_turns: 200
    prompt: |
      Implement the feature following TDD methodology.
      1. Read the approved design document
      2. Write failing tests first
      3. Implement code to pass tests
      4. Run all tests and lint checks
      5. Commit your changes

      ## Available Crew Skills
      Use `/test-writer` to generate failing tests from the design document.
      Then implement to make them pass.
      After implementation, use `/spec-review` to validate coverage against
      the design.
      Full crew available — use the right skill for the job:
      - `/test-writer` — generate test suites (unit, integration, E2E)
      - `/spec-review` — validate implementation against design spec
      - `/website` — Next.js frontend builds
      - `/fastapi-service` — Python API services
      - `/ddd-pattern` — domain model implementation
      - `/shadcn-ui` — UI component composition
    required_artifacts: [design.md]
    contract:
      detect_stubs: true

  # Phase 3: Evaluate — verify the implementation works end-to-end
  - id: evaluate
    name: Evaluate
    type: task
    max_turns: 60
    prompt: |
      Evaluate the implementation by running functional tests against the
      actual running application.

      ## Frontend Projects (has UI components)
      1. Start the dev server if not already running
      2. Use Playwright / agent-browser to navigate key user flows
      3. Verify visual output matches design expectations
      4. Check for console errors, broken links, layout issues
      5. Use `/react-doctor` if React-specific issues are detected

      ## Backend Projects (API / service only)
      1. Run integration tests against live endpoints
      2. Verify API contracts (request/response shapes, status codes)
      3. Test error paths and edge cases
      4. Verify database state changes are correct

      ## For All Projects
      1. Score each acceptance criterion from the design as PASS or FAIL
      2. Run the full test suite with `/test-runner`
      3. Write `evaluation-results.md` via `pixl artifact put` with:
         - Test evidence (screenshots, response payloads, test output)
         - Pass/fail verdict per acceptance criterion
         - Overall result: PASS or FAIL
         - If FAIL: specific issues that need fixing

      ## Available Crew Skills
      - `/test-runner` — run test suites with smart discovery
      - `/react-doctor` — diagnose and fix React rendering issues
    required_artifacts: [design.md]
    outputs: [evaluation-results.md]
    contract:
      must_write: [evaluation-results.md]
      must_include_sections:
        evaluation-results.md: ["Test Evidence", "Pass/Fail", "Overall Result"]

  # Phase 4: Review & Finalize
  - id: finalize
    name: Review & Finalize
    type: task
    max_turns: 100
    prompt: |
      Review all changes, fix any issues, and prepare for PR.
      1. Use `/self-review-fix-loop` to run automated review + fix cycles
      2. Use `/code-review` for multi-agent quality gate
      3. Ensure tests pass and lint is clean
      4. Create a PR with descriptive title and body using `gh pr create`

      ## Available Crew Skills
      - `/self-review-fix-loop` — iterative review + auto-fix
      - `/code-review` — multi-agent PR review with confidence scoring
      - `/spec-review` — final spec drift check
    contract:
      detect_stubs: true

loops:
  - id: fix-implementation
    from: finalize
    to: implement
    trigger: failure
    max_iterations: 2
  - id: evaluate-fix
    from: evaluate
    to: implement
    trigger: failure
    max_iterations: 2
