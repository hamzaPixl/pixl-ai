id: detect-context
name: Detect Context
description: Build structured project context for a feature
version: 2.0.0
tier: utility
workflow_format: v2
session_mode: plugin
routing:
  auto_route: false
  sub_invocable: true
  category: general

stages:
  - id: detect-context
    name: Detect Project Context
    type: task
    max_turns: 30
    prompt: |
      Explore the codebase and build structured project context.
      Identify relevant files, patterns, and architecture for the current task.
    contract:
      structured_output: true
