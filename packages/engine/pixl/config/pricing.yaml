  claude-opus-4-6:
    input: 15.0
    output: 75.0
  claude-sonnet-4-6:
    input: 3.0
    output: 15.0
  claude-haiku-4-5:
    input: 0.80
    output: 4.0

  # Codex (OpenAI)
  codex-5.2:
    input: 2.50
    output: 10.0
  gpt-5.2-codex:
    input: 2.50
    output: 10.0
  gpt-5.2-codex:xhigh:
    input: 2.50
    output: 10.0
  gpt-5.3-codex:
    input: 3.0
    output: 12.0
  gpt-5.3-codex:spark:
    input: 1.50
    output: 6.0
  spark:
    input: 1.50
    output: 6.0

  # Gemini
  gemini-3-pro-preview:
    input: 3.50
    output: 10.50
  gemini-3-flash-preview:
    input: 0.15
    output: 0.60
  gemini-2.5-pro:
    input: 2.50
    output: 10.0
  gemini-2.5-flash:
    input: 0.15
    output: 0.60
  gemini-2.5-flash-lite:
