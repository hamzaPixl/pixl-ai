name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint
        run: uv run ruff check packages/engine/ packages/cli/

      - name: Format check
        run: uv run ruff format --check packages/engine/ packages/cli/

      - name: Type check
        run: uv run pyright

      - name: Test
        run: uv run python -m pytest --import-mode=importlib
