name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Python: Lint + Format ─────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Ruff lint
        run: uv run ruff check packages/engine/ packages/cli/ packages/api/

      - name: Ruff format
        run: uv run ruff format --check packages/engine/ packages/cli/ packages/api/

  # ── Python: Type Check ────────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Pyright
        run: uv run pyright

  # ── Python: Test + Coverage ────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests with coverage
        run: uv run python -m pytest --import-mode=importlib --cov --cov-report=term-missing --cov-report=xml

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ── Python: Build Verification ─────────────────────────────
  build:
    name: Build Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Build engine wheel
        run: uv build --package pixl-engine

      - name: Build CLI wheel
        run: uv build --package pixl-cli

      - name: Build API wheel
        run: uv build --package pixl-api

      - name: Verify importability
        run: |
          uv run python -c "import pixl; print('pixl-engine OK')"
          uv run python -c "import pixl_cli; print('pixl-cli OK')"
          uv run python -c "import pixl_api; print('pixl-api OK')"

  # ── Python: Security Audit ─────────────────────────────────
  audit-python:
    name: Python Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Install pip-audit
        run: uv pip install pip-audit

      - name: Run pip-audit
        # CVE-2026-4539: pygments 2.19.2 — no fix available yet (latest version)
        # Remove --ignore-vuln once pygments releases a patch
        run: uv run pip-audit --ignore-vuln CVE-2026-4539

  # ── TypeScript: Console Checks ─────────────────────────────
  console:
    name: Console (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/console
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check
        run: pnpm tsc --noEmit

      - name: Build
        run: pnpm build

  # ── TypeScript: Sandbox Checks ─────────────────────────────
  sandbox:
    name: Sandbox (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sandbox
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: npm audit
        run: npm audit --omit=dev

      - name: Unit tests
        run: npm test
